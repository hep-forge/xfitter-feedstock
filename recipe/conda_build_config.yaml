# hep-forge's root packages are published for one python per version
# family (6.34/6.38 -> 3.12); without this pin conda-build tries
# conda-forge's global default python matrix, and any slot ROOT wasn't
# built for (e.g. py314) is unsatisfiable under strict channel priority.
python:
  - "3.12"

# 6.34 dropped in turn: applgrid/apfelgrid/fastnlo (also in this chain)
# have all moved to 6.38 to match, so this does too -- lets xfitter
# coexist with root-plus/escalade/etc. in one environment.
root:
  - 6.38

packages:
  - numpy

# Build against the oldest still-published openssl 3.x minor (patch
# floats to the latest 3.0.z). Without this the build picks up conda-forge's
# global default (currently 3.5), baking in ">=3.5.x,<4.0a0" via
# run_exports -- higher than what some prebuilt conda-forge binaries
# (e.g. git, linked against 3.0.0) tolerate at runtime ("OpenSSL version
# mismatch" trips on a major.minor drift). See cernlib-feedstock's
# conda_build_config.yaml for the full rationale; kept in sync here so
# xfitter doesn't drag the shared environment's openssl floor back up.
openssl:
  - 3.0

c_stdlib:
  - sysroot                  # [linux]
c_stdlib_version:
  - 2.17    # [linux]

c_compiler:            # [linux]
  - gcc
cxx_compiler:          # [linux]
  - gxx
c_compiler_version:    # [linux]
  - 15
cxx_compiler_version:  # [linux]
  - 15
libgcc_version:        # [linux]
  - 15.*
libstdcxx_version:     # [linux]
  - 15.*
